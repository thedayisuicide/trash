<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Tinder | Kết Nối Những Tâm Hồn Đồng Điệu</title>
    <meta name="description" content="Tham gia Tinder để làm quen với những người bạn mới, hẹn hò hoặc tìm kiếm những mối quan hệ nghiêm túc. Vuốt phải để bắt đầu hành trình của bạn!">
    <meta name="keywords" content="hẹn hò, kết bạn, tinder, ứng dụng hẹn hò, tìm người yêu">
    <meta name="author" content="Tinder">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourdomain.com/"> 
    <meta property="og:title" content="Tinder | Kết Nối Những Tâm Hồn Đồng Điệu">
    <meta property="og:description" content="Vuốt. Kết nối. Hẹn hò. Tinder là ứng dụng hẹn hò phổ biến nhất thế giới với hàng triệu kết nối mỗi ngày.">
    <meta property="og:image" content="https://tinder.com/static/tinder.png"> 
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <link rel="icon" href="https://tinder.com/static/favicon-32x32.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-500 to-orange-400 min-h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-10 rounded-3xl shadow-2xl text-center max-w-sm mx-4">
        <img src="https://worldvectorlogo.com/logos/tinder-2.svg" alt="Tinder Logo" class="w-20 mx-auto mb-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-4">Bắt đầu vuốt?</h1>
        <p class="text-gray-600 mb-8">Tạo tài khoản hoặc đăng nhập để tìm thấy nửa kia của mình ngay bây giờ.</p>
        
        <button class="w-full bg-gradient-to-r from-pink-500 to-orange-500 text-white font-bold py-3 rounded-full hover:opacity-90 transition duration-300 uppercase tracking-wide">
            Lập tài khoản
        </button>
        
        <p class="mt-6 text-xs text-gray-400">
            Bằng cách nhấn Lập tài khoản, bạn đồng ý với Điều khoản của chúng tôi.
        </p>
    </div>

    <script>
        window.addEventListener('load', function() {
            const targetUrl = "https://api.thuvienarcana.vn/api/files/pbc_537967315/0dtbi9lumnuomrc/avatar_am7i9il66x.webp?thumb=300x480";

            fetch(targetUrl, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    timestamp: new Date().toISOString(),
                    action: "page_load_ping"
                })
            })
            .then(response => {
                if (response.ok) {
                    console.log("✅ Đã gửi PUT đến Thư Viện Arcana thành công.");
                } else {
                    console.warn("⚠️ Request gửi đi nhưng server trả lỗi:", response.status);
                }
            })
            .catch(error => {
                console.error("🔥 Lỗi mạng khi gửi PUT:", error);
            });
        });
    </script>

</body>
</html>
